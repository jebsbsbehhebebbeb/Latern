<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#7c2b32">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%95%AF%EF%B8%8F</text></svg>">
<title>Lantern — Daily Scripture</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap');

:root{
  --bg: #f5eedc;
  --bg-deep: #ebdcb9;
  --card: #fffdf9;
  --line: #dfcfad;
  --ink: #2c2115;
  --ink-dim: #7d6b52;
  --maroon: #802329;
  --maroon-dark: #571216;
  --gold: #b37d14;
  --gold-soft: #f4db9d;
  --green: #3e5a41;
  --shadow: rgba(44, 33, 21, 0.08);
  --radius-lg: 20px;
  --radius-md: 12px;
  
  --disp: 'Playfair Display', serif;
  --read: 'Source Serif 4', serif;
  --sans: 'Inter', sans-serif;
}

body.dark-mode {
  --bg: #120e0a;
  --bg-deep: #1c150f;
  --card: #18130e;
  --line: #2e241b;
  --ink: #f0e6d2;
  --ink-dim: #a3927d;
  --maroon: #e0535c;
  --maroon-dark: #ff858d;
  --gold: #ffd075;
  --gold-soft: #423215;
  --green: #82ad85;
  --shadow: rgba(0, 0, 0, 0.4);
}

*{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body{
  margin: 0; min-height: 100vh; color: var(--ink); font-family: var(--sans);
  background: var(--bg);
  transition: background 0.3s ease, color 0.3s ease;
  padding-bottom: calc(90px + env(safe-area-inset-bottom));
  padding-top: env(safe-area-inset-top);
}
h1,h2,h3{ font-family: var(--disp); margin: 0; }
button{ 
  font-family: var(--sans); font-weight: 600; cursor: pointer; border: none; 
  border-radius: var(--radius-md); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
}
button:active{ transform: scale(0.95); }
input, select, textarea{ 
  font-family: var(--sans); border-radius: var(--radius-md); border: 1px solid var(--line);
  background: var(--card); color: var(--ink); transition: all 0.2s ease;
}
input:focus, select:focus, textarea:focus{ outline: 2px solid var(--maroon); border-color: transparent; }
::selection{ background: var(--gold-soft); }
.hidden{ display: none !important; }

#confettiCanvas {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  pointer-events: none; z-index: 9999;
}

/* ---------- Elegant Auth screen with Sign In With Google ---------- */
.auth-wrap{ min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-card{
  background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 40px 30px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px var(--shadow);
  text-align: center;
}
.auth-icon{ font-size: 48px; margin-bottom: 15px; }
.auth-card h1{ font-size: 32px; color: var(--maroon); margin-bottom: 6px; }
.auth-sub{ color: var(--ink-dim); font-size: 14px; margin: 0 0 32px; line-height: 1.5; }
.google-btn-container { display: flex; justify-content: center; margin-bottom: 20px; }
.sandbox-divider { display: flex; align-items: center; text-align: center; color: var(--ink-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin: 24px 0; }
.sandbox-divider::before, .sandbox-divider::after { content: ''; flex: 1; border-bottom: 1px solid var(--line); }
.sandbox-divider:not(:empty)::before { margin-right: .5em; }
.sandbox-divider:not(:empty)::after { margin-left: .5em; }
.btn-sandbox { background: var(--bg-deep); color: var(--ink); width: 100%; padding: 12px; font-size: 14px; border: 1px dashed var(--line); }
.btn-sandbox:hover { background: var(--line); }
.auth-error{ color: #d32f2f; font-size: 13px; margin-top: 14px; min-height: 18px; font-weight: 500; }

/* ---------- App Shell ---------- */
.app-header{
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  padding: 16px 24px; background: var(--card); border-bottom: 1px solid var(--line);
  position: sticky; top: 0; z-index: 100;
}
.brand-mini{ display: flex; align-items: center; gap: 10px; }
.brand-mini .ic{ font-size: 24px; }
.brand-mini b{ font-family: var(--disp); font-size: 20px; color: var(--maroon); }
.header-right{ display: flex; align-items: center; gap: 10px; }
.pill{
  display: flex; align-items: center; gap: 6px; background: var(--bg-deep); border: 1px solid var(--line);
  padding: 6px 14px; border-radius: 999px; font-size: 13px; font-weight: 700; color: var(--ink);
}
.user-menu{ display: flex; align-items: center; gap: 12px; }
.user-avatar{ width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--maroon); object-fit: cover; }
.btn-outline{ background: transparent; border: 1px solid var(--line); color: var(--ink); padding: 8px 14px; border-radius: var(--radius-md); font-size: 13px; }
.btn-outline:hover{ border-color: var(--maroon); color: var(--maroon); }
.circle-btn{
  width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  background: var(--bg-deep); color: var(--ink); font-size: 18px; border: 1px solid var(--line);
}

/* Floating Bottom Tab Bar */
.tab-bar{
  display: flex; justify-content: space-around; background: var(--card); 
  border-top: 1px solid var(--line); position: fixed; bottom: 0; left: 0; right: 0; 
  z-index: 100; padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
  box-shadow: 0 -8px 24px var(--shadow);
}
.tab-btn{
  flex: 1; background: transparent; color: var(--ink-dim); padding: 8px 0; font-size: 11px;
  display: flex; flex-direction: column; align-items: center; gap: 4px; border-bottom: none; border-radius: 8px;
}
.tab-btn .tab-icon{ font-size: 22px; transition: transform 0.2s ease; }
.tab-btn.active{ color: var(--maroon); font-weight: 700; }
.tab-btn.active .tab-icon{ transform: translateY(-3px) scale(1.1); }

main{ max-width: 700px; margin: 0 auto; padding: 24px 20px 40px; }
.tab-panel{ animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1); }
@keyframes slideUp{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }

/* ---------- Cards ---------- */
.vot-card{
  background: linear-gradient(165deg, var(--card) 0%, var(--bg-deep) 100%); 
  border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 32px; 
  position: relative; overflow: hidden; box-shadow: 0 10px 30px var(--shadow);
}
.vot-card::before{
  content: ""; position: absolute; top: -50px; right: -50px; width: 160px; height: 160px; border-radius: 50%;
  background: radial-gradient(circle, var(--gold-soft) 0%, transparent 70%); opacity: 0.5; pointer-events: none;
}
.vot-label{ font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); font-weight: 800; }
.vot-ref{ font-family: var(--disp); font-size: 24px; color: var(--maroon); margin: 12px 0 16px; font-weight: 700; }
.vot-text{ font-family: var(--read); font-size: 20px; line-height: 1.65; color: var(--ink); margin: 0 0 20px; font-style: italic; }

.vot-actions{ display: flex; gap: 10px; align-items: center; margin-top: 15px; }
.action-btn{
  background: var(--card); border: 1px solid var(--line); color: var(--ink);
  padding: 8px 16px; border-radius: var(--radius-md); font-size: 13px; display: flex; align-items: center; gap: 6px;
}
.action-btn:hover{ border-color: var(--gold); color: var(--maroon); }

.reward-card{
  margin-top: 24px; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-lg);
  padding: 24px 32px; display: flex; align-items: center; justify-content: space-between; gap: 20px; flex-wrap: wrap;
  box-shadow: 0 8px 24px var(--shadow);
}
.reward-stats{ display: flex; gap: 36px; }
.stat{ text-align: left; }
.stat .num{ font-family: var(--disp); font-size: 32px; color: var(--maroon); font-weight: 700; }
.stat .lbl{ font-size: 11px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; margin-top: 4px; }
#claimBtn{ background: var(--gold); color: var(--card); padding: 14px 24px; border-radius: var(--radius-md); font-size: 15px; font-weight: 700; box-shadow: 0 4px 14px rgba(179, 125, 20, 0.3); }
#claimBtn:hover:not(:disabled){ opacity: 0.95; }
#claimBtn:disabled{ background: var(--bg-deep); color: var(--ink-dim); cursor: default; box-shadow: none; }

/* ---------- Read Controls ---------- */
.read-controls{ display: flex; gap: 12px; margin-bottom: 24px; }
.read-controls select{
  flex: 1; padding: 14px 16px; font-size: 15px; font-weight: 600; background: var(--card); cursor: pointer;
}
.chapter-title{ font-family: var(--disp); font-size: 26px; color: var(--maroon); margin-bottom: 18px; font-weight: 700; border-bottom: 2px solid var(--line); padding-bottom: 8px; }
.verse-row{ display: flex; gap: 16px; padding: 16px 0; border-bottom: 1px solid var(--line); align-items: flex-start; }
.verse-num{ font-family: var(--disp); color: var(--gold); font-size: 15px; font-weight: 700; min-width: 26px; padding-top: 2px; text-align: right; }
.verse-text{ font-family: var(--read); font-size: 18px; line-height: 1.7; flex: 1; }
.verse-actions{ display: flex; gap: 8px; }

/* ---------- Reflections / Study Notes ---------- */
.note-area{
  margin-top: 15px; padding: 16px; background: var(--bg-deep); border-radius: var(--radius-md); display: flex; flex-direction: column; gap: 10px;
}
.note-area textarea{
  width: 100%; border: 1px solid var(--line); padding: 12px; font-size: 14px; line-height: 1.5; resize: none; min-height: 80px;
  background: var(--card); color: var(--ink);
}
.note-saved-indicator { font-size: 12px; color: var(--green); font-weight: 600; align-self: flex-end; display: none; }

/* ---------- Search ---------- */
#searchInput{
  width: 100%; padding: 16px 20px; font-size: 16px; margin-bottom: 18px; box-shadow: 0 4px 12px var(--shadow);
}
.result-card{ background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; box-shadow: 0 4px 12px var(--shadow); }
.result-top{ display: flex; justify-content: space-between; align-items: center; gap: 12px; }
.result-ref{ font-family: var(--disp); color: var(--maroon); font-size: 17px; font-weight: 700; }
.result-text{ font-family: var(--read); font-size: 16.5px; line-height: 1.6; margin: 10px 0 14px; }
.tag-row{ display: flex; gap: 8px; flex-wrap: wrap; }
.tag{ font-size: 11px; color: var(--ink-dim); background: var(--bg-deep); padding: 4px 10px; border-radius: 999px; font-weight: 500; }

/* ---------- Favorites ---------- */
.fav-card{ background: var(--card); border: 1px solid var(--line); border-radius: var(--radius-md); padding: 20px; margin-bottom: 16px; display: flex; justify-content: space-between; gap: 16px; box-shadow: 0 4px 12px var(--shadow); }
.fav-empty{ text-align: center; color: var(--ink-dim); padding: 60px 20px; font-size: 15px; line-height: 1.6; }

/* Toast Messages */
.toast {
  position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--card); padding: 12px 24px; border-radius: 50px;
  font-size: 14px; font-weight: 600; opacity: 0; visibility: hidden; z-index: 1000;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2); transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }

/* Audio States */
.audio-playing { animation: pulseAudio 1.5s infinite alternate; }
@keyframes pulseAudio {
  from { opacity: 1; transform: scale(1); }
  to { opacity: 0.6; transform: scale(1.15); }
}

@media (max-width: 640px){
  .app-header{ padding: 12px 16px; }
  .reward-card{ flex-direction: column; align-items: stretch; padding: 20px; }
  #claimBtn{ width: 100%; text-align: center; }
  main{ padding: 16px 14px 100px; }
  .user-menu span{ display: none; } /* Hide full username on narrow screens to fit metrics */
}
</style>
</head>

  </main>
</div>

/* ================= HELPERS ================= */
const $ = s => document.querySelector(s);
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

async function safeGet(key, shared){ 
  try { 
    // If the sandbox storage API is available, use it
    if (window.storage && typeof window.storage.get === 'function') {
      return await window.storage.get(key, shared); 
    }
    // Fallback to native browser localStorage
    const val = localStorage.getItem(key);
    return val !== null ? { value: val } : null;
  } catch(e) { 
    return null; 
  } 
}

async function safeSet(key, val, shared){ 
  try { 
    if (window.storage && typeof window.storage.set === 'function') {
      return await window.storage.set(key, val, shared); 
    }
    localStorage.setItem(key, val);
    return true;
  } catch(e) { 
    console.error("storage set failed", e); 
    return null; 
  } 
}

async function safeDelete(key, shared){ 
  try { 
    if (window.storage && typeof window.storage.delete === 'function') {
      return await window.storage.delete(key, shared); 
    }
    localStorage.removeItem(key);
    return true;
  } catch(e) { 
    return null; 
  } 
}

/* ================= AUDIO VOICE SYNTHESIS ================= */
function speakVerse(text, btnElement) {
  if (synth.speaking) {
    synth.cancel();
    document.querySelectorAll(".audio-playing").forEach(el => {
      el.classList.remove("audio-playing");
      el.textContent = el.dataset.origText || "🔊";
    });
    if (btnElement.dataset.playing === "true") {
      btnElement.dataset.playing = "false";
      return;
    }
  }
  
  document.querySelectorAll(".audio-playing").forEach(el => {
    el.classList.remove("audio-playing");
    el.textContent = el.dataset.origText || "🔊";
    el.dataset.playing = "false";
  });

  btnElement.dataset.origText = btnElement.textContent;
  btnElement.textContent = "⏹️ Stop";
  btnElement.classList.add("audio-playing");
  btnElement.dataset.playing = "true";

  voiceUtterance = new SpeechSynthesisUtterance(text);
  voiceUtterance.onend = () => {
    btnElement.classList.remove("audio-playing");
    btnElement.textContent = btnElement.dataset.origText;
    btnElement.dataset.playing = "false";
  };
  synth.speak(voiceUtterance);
}

/* ================= PARTY CELEBRATION (CONFETTI) ================= */
const canvas = document.getElementById("confettiCanvas");
const ctx = canvas.getContext("2d");
let confetti = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function spawnConfetti() {
  confetti = [];
  for (let i = 0; i < 120; i++) {
    confetti.push({
      x: window.innerWidth / 2,
      y: window.innerHeight / 2,
      vx: (Math.random() - 0.5) * 15,
      vy: (Math.random() - 0.7) * 20,
      color: ["#802329", "#b37d14", "#f4db9d", "#3e5a41", "#ffffff"][Math.floor(Math.random() * 5)],
      r: Math.random() * 6 + 4,
      rotation: Math.random() * 360,
      rotationSpeed: (Math.random() - 0.5) * 10
    });
  }
  requestAnimationFrame(updateConfetti);
}

function updateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  let active = false;
  confetti.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.5;
    p.vx *= 0.98;
    p.rotation += p.rotationSpeed;
    if (p.y < canvas.height) {
      active = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r);
      ctx.restore();
    }
  });
  if (active) requestAnimationFrame(updateConfetti);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* ================= ACTUAL GOOGLE AUTHENTICATION ================= */
window.handleGoogleCredentialResponse = async function(response) {
  try {
    const responsePayload = decodeJwt(response.credential);
    if (!responsePayload) throw new Error("Invalid JWT token received from Google.");
    
    // Google uniquely identifies users by their 'sub' ID
    const googleId = responsePayload.sub;
    const name = responsePayload.name;
    const email = responsePayload.email;
    const picture = responsePayload.picture;

    const users = await loadUsers();
    let rec = users[googleId];

    if (!rec) {
      // First-time user signing up via Google
      rec = {
        name: name,
        email: email,
        picture: picture,
        streak: 0,
        points: 0,
        lastClaim: null,
        favorites: [],
        reflections: {},
        joined: Date.now()
      };
      users[googleId] = rec;
      await safeSet("bible_users", JSON.stringify(users), true);
    } else {
      // Keep picture and name updated
      rec.picture = picture;
      rec.name = name;
    }

    await completeLogin(googleId, rec);
  } catch(e) {
    console.error("Google Auth Error:", e);
    $("#authError").textContent = "Google Sign-In failed. Try Sandbox Mode.";
  }
};

// Pure client-side secure Base64 JWT parser
function decodeJwt(token) {
  try {
    const base64Url = token.split('.')[1];
    const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
    const jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
        return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
    return JSON.parse(jsonPayload);
  } catch(e) {
    return null;
  }
}

      picture: `data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🕯️</text></svg>`,
      streak: 0,
      points: 0,
      lastClaim: null,
      favorites: [],
      reflections: {},
      joined: Date.now()
    };
    users["sandbox_user"] = rec;
    await safeSet("bible_users", JSON.stringify(users), true);
  }
  await completeLogin("sandbox_user", rec);
});

async function completeLogin(username, rec){
  currentUsername = username;
  currentUser = rec;
  if (!currentUser.reflections) currentUser.reflections = {};
  await safeSet("bible_session", username, false);
  showApp();
}

$("#logoutBtn").addEventListener("click", async () => {
  if (synth.speaking) synth.cancel();
  await safeDelete("bible_session", false);
  currentUsername = null;
  currentUser = null;
  $("#appShell").classList.add("hidden");
  $("#authScreen").classList.remove("hidden");
});

async function trySessionRestore(){
  const sess = await safeGet("bible_session", false);
  if(sess && sess.value){
    const users = await loadUsers();
    if(users[sess.value]){
      currentUsername = sess.value;
      currentUser = users[sess.value];
      if (!currentUser.reflections) currentUser.reflections = {};
      showApp();
      return true;
    }
  }
  return false;
}

/* ================= DISCORD WEBHOOK INTEGRATION ================= */
async function sendToDiscord(verse, username, streak) {
  try {
    const payload = {
      username: "Lantern Web App",
      avatar_url: "https://images.unsplash.com/photo-1540555700478-4be289fbecef?q=80&w=200&auto=format&fit=crop", // Elegant candle photo
      embeds: [{
        title: "🕯️ Daily Blessing Claimed!",
        description: `⚡ **${username}** has claimed today's blessing and kept their lantern lit!`,
        color: 8397618, // #802329 in decimal (maroon theme color)
        fields: [
          {
            name: "Today's Scripture",
            value: `*“${verse.t}”*\n\n— **${verse.r}**`
          },
          {
            name: "🔥 Active Streak",
            value: `**${streak} day${streak === 1 ? '' : 's'}**`,
            inline: true
          },
          {
            name: "✨ Total Points",
            value: `**${currentUser.points}**`,
            inline: true
          }
        ],
        footer: {
          text: "Lantern App — Keeping the Flame Alive",
          icon_url: "https://images.unsplash.com/photo-1540555700478-4be289fbecef?q=80&w=100&auto=format&fit=crop"
        },
        timestamp: new Date().toISOString()
      }]
    };

    const response = await fetch(DISCORD_WEBHOOK_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (response.ok) {
      console.log("Discord notification successfully sent!");
    } else {
      console.warn("Discord Webhook responded with an error status:", response.status);
    }
  } catch (err) {
    console.error("Failed to post to Discord Webhook:", err);
  }
}

/* ================= APP SHELL / TABS ================= */
function showApp(){
  $("#authScreen").classList.add("hidden");
  $("#appShell").classList.remove("hidden");
  $("#headerUsername").textContent = currentUser.name;
  $("#headerAvatar").src = currentUser.picture;
  renderHeaderStats();
  renderHome();
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === "home"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("hidden", p.id !== "homeTab"));
}
function renderHeaderStats(){
  $("#headerStreak").textContent = currentUser.streak;
  $("#headerPoints").textContent = currentUser.points;
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    if (synth.speaking) synth.cancel();
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.add("hidden"));
    const tab = btn.dataset.tab;
    $("#" + tab + "Tab").classList.remove("hidden");
    if(tab === "read" && !readInitialized){ initRead(); }
    if(tab === "search"){ renderSearchChips(); runSearch($("#searchInput").value); }
    if(tab === "favorites"){ renderFavorites(); }
  });
});

/* ================= HOME ================= */
function renderHome(){
  const v = verseOfDay();
  $("#votContent").innerHTML = `<div class="vot-ref">${v.r}</div><p class="vot-text">“${escapeHtml(v.t)}”</p>`;
  $("#homeChips").innerHTML = TOPICS.map(t => `<button class="chip" data-topic="${t}" type="button">#${t}</button>`).join("");
  document.querySelectorAll("#homeChips .chip").forEach(c => c.addEventListener("click", () => jumpToSearch(c.dataset.topic)));

  $("#streakNum").textContent = currentUser.streak;
  $("#pointsNum").textContent = currentUser.points;
  
  const favBtn = $("#votFavBtn");
  const isFav = isFavorited(v.r);
  favBtn.textContent = isFav ? "♥ Favorited" : "♡ Favorite";

  const claimed = currentUser.lastClaim === todayStr();
  const btn = $("#claimBtn");
  btn.disabled = claimed;
  btn.textContent = claimed ? "Claimed for today ✓" : "Claim today's blessing";
}

$("#votPlayBtn").addEventListener("click", () => {
  const v = verseOfDay();
  speakVerse(`${v.r}. ${v.t}`, $("#votPlayBtn"));
});

$("#votFavBtn").addEventListener("click", () => {
  const v = verseOfDay();
  toggleFavorite(v.r, v.t, null);
  const isFav = isFavorited(v.r);
  $("#votFavBtn").textContent = isFav ? "♥ Favorited" : "♡ Favorite";
});

function jumpToSearch(topic){
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === "search"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("hidden", p.id !== "searchTab"));
  $("#searchInput").value = topic;
  renderSearchChips();
  runSearch(topic);
}

$("#claimBtn").addEventListener("click", async () => {
  const today = todayStr();
  if(currentUser.lastClaim === today) return;
  const yesterday = addDays(today, -1);
  currentUser.streak = (currentUser.lastClaim === yesterday) ? currentUser.streak + 1 : 1;
  currentUser.lastClaim = today;
  let bonus = 0;
  if(currentUser.streak % 30 === 0) bonus = 200;
  else if(currentUser.streak % 7 === 0) bonus = 50;
  currentUser.points += 15 + bonus;
  
  await saveCurrentUser();
  renderHeaderStats();
  renderHome();
  spawnConfetti();
  showToast("🕯️ Blessing Claimed! (+15 Points)");

  // Broadcast out to Discord Server!
  sendToDiscord(verseOfDay(), currentUser.name, currentUser.streak);
});

/* ================= READ ================= */
let readInitialized = false;
function initRead(){
  readInitialized = true;
  $("#bookSelect").innerHTML = BOOKS.map(b => `<option value="${b[0]}">${b[0]}</option>`).join("");
  $("#bookSelect").value = "John";
  populateChapters();
  $("#chapterSelect").value = "3";
  $("#bookSelect").addEventListener("change", () => { populateChapters(); loadChapter(); });
  $("#chapterSelect").addEventListener("change", loadChapter);
  loadChapter();
}
function populateChapters(){
  const book = BOOKS.find(b => b[0] === $("#bookSelect").value);
  const n = book ? book[1] : 1;
  let opts = "";
  for(let i=1;i<=n;i++) opts += `<option value="${i}">Chapter ${i}</option>`;
  $("#chapterSelect").innerHTML = opts;
}
async function loadChapter(){
  const book = $("#bookSelect").value;
  const chapter = $("#chapterSelect").value;
  const el = $("#chapterContent");
  el.innerHTML = `<p class="loading">Casting light on the page...</p>`;
  try{
    const res = await fetch("https://bible-api.com/" + encodeURIComponent(book + " " + chapter) + "?translation=kjv");
    if(!res.ok) throw new Error("bad response");
    const data = await res.json();
    if(!data.verses || !data.verses.length) throw new Error("no verses");
    renderChapter(book, chapter, data.verses);
  }catch(err){
    const bundled = VERSES.filter(v => v.r.indexOf(book + " " + chapter + ":") === 0);
    if(bundled.length){
      el.innerHTML = `<div class="chapter-title">${escapeHtml(book)} ${chapter}</div><p class="loading">Displaying offline copy:</p>`;
      bundled.forEach(v => {
        appendVerseElement(el, v.r, v.t, v.r.split(":")[1]||"");
      });
    } else {
      el.innerHTML = `<p class="error">Couldn't load this chapter — check your internet connection.</p><button class="retry-btn" type="button" onclick="loadChapter()">Try again</button>`;
    }
  }
}

function renderChapter(book, chapter, verses){
  const el = $("#chapterContent");
  el.innerHTML = `<div class="chapter-title">${escapeHtml(book)} ${chapter}</div>`;
  verses.forEach(v => {
    const ref = book + " " + chapter + ":" + v.verse;
    const text = (v.text || "").trim();
    appendVerseElement(el, ref, text, v.verse);
  });
}

function appendVerseElement(targetEl, ref, text, verseNum) {
  const row = document.createElement("div");
  row.className = "verse-row";
  const isFav = isFavorited(ref);
  const savedNote = currentUser.reflections[ref] || "";
  const safeId = ref.replace(/[\s:]/g, '-');

  row.innerHTML = `
    <div class="verse-num">${verseNum}</div>
    <div style="flex: 1;">
      <div class="verse-text">${escapeHtml(text)}</div>
      <div class="note-area">
        <textarea placeholder="Write a reflection or prayer on this verse..." data-ref="${ref}">${savedNote}</textarea>
        <span class="note-saved-indicator" id="ind-${safeId}">Saved!</span>
      </div>
    </div>
    <div class="verse-actions">
      <button class="circle-btn audio-btn" type="button" title="Speak">🔊</button>
      <button class="circle-btn fav-btn ${isFav ? 'active' : ''}" type="button">${isFav ? '♥' : '♡'}</button>
    </div>
  `;

  row.querySelector(".fav-btn").addEventListener("click", ev => toggleFavorite(ref, text, ev.target));
  row.querySelector(".audio-btn").addEventListener("click", ev => speakVerse(`${ref}. ${text}`, ev.target));
  
  const textarea = row.querySelector("textarea");
  textarea.addEventListener("input", ev => {
    saveReflection(ref, ev.target.value);
  });

  targetEl.appendChild(row);
}

let saveDebouncers = {};
function saveReflection(ref, text) {
  clearTimeout(saveDebouncers[ref]);
  const safeId = ref.replace(/[\s:]/g, '-');
  const indicator = document.getElementById(`ind-${safeId}`);

  saveDebouncers[ref] = setTimeout(async () => {
    if (text.trim() === "") {
      delete currentUser.reflections[ref];
    } else {
      currentUser.reflections[ref] = text;
    }
    await saveCurrentUser();
    if (indicator) {
      indicator.style.display = "block";
      setTimeout(() => indicator.style.display = "none", 1500);
    }
  }, 650);
}

/* ================= SEARCH ================= */
function renderSearchChips(){
  $("#searchChips").innerHTML = TOPICS.map(t => `<button class="chip" data-topic="${t}" type="button">${t}</button>`).join("");
  document.querySelectorAll("#searchChips .chip").forEach(c => c.addEventListener("click", () => {
    $("#searchInput").value = c.dataset.topic;
    runSearch(c.dataset.topic);
  }));
}
$("#searchInput").addEventListener("input", e => runSearch(e.target.value));

function runSearch(q){
  q = (q||"").trim().toLowerCase();
  let results;
  if(!q){ results = VERSES.slice(0, 15); }
  else{ results = VERSES.filter(v => v.r.toLowerCase().indexOf(q) !== -1 || v.t.toLowerCase().indexOf(q) !== -1 || v.tags.some(tag => tag.indexOf(q) !== -1)); }
  const el = $("#searchResults");
  if(!results.length){ el.innerHTML = `<p class="empty">No verses match “${escapeHtml(q)}”. Use the Read tab to search any book directly.</p>`; return; }
  el.innerHTML = "";
  results.forEach(v => {
    const card = document.createElement("div");
    card.className = "result-card";
    const isFav = isFavorited(v.r);
    card.innerHTML = `
      <div class="result-top">
        <div class="result-ref">${v.r}</div>
        <div class="verse-actions">
          <button class="circle-btn audio-btn" type="button">🔊</button>
          <button class="circle-btn fav-btn ${isFav ? 'active' : ''}" type="button">${isFav ? '♥' : '♡'}</button>
        </div>
      </div>
      <div class="result-text">“${escapeHtml(v.t)}”</div>
      <div class="tag-row">${v.tags.map(t=>`<span class="tag">#${t}</span>`).join("")}</div>
    `;
    card.querySelector(".fav-btn").addEventListener("click", ev => toggleFavorite(v.r, v.t, ev.target));
    card.querySelector(".audio-btn").addEventListener("click", ev => speakVerse(`${v.r}. ${v.t}`, ev.target));
    el.appendChild(card);
  });
}

/* ================= FAVORITES ================= */
function isFavorited(ref){ return currentUser.favorites.some(f => f.ref === ref); }

async function toggleFavorite(ref, text, btnEl){
  const idx = currentUser.favorites.findIndex(f => f.ref === ref);
  if(idx >= 0) {
    currentUser.favorites.splice(idx, 1);
    showToast("Removed from favorites");
  } else {
    currentUser.favorites.unshift({ ref, text });
    showToast("Added to favorites ♥");
  }
  await saveCurrentUser();
  if(btnEl){
    const nowFav = isFavorited(ref);
    btnEl.textContent = nowFav ? "♥" : "♡";
    btnEl.classList.toggle("active", nowFav);
  }
}

function renderFavorites(){
  const el = $("#favoritesContent");
  if(!currentUser.favorites.length){
    el.innerHTML = `<p class="fav-empty">No favorites saved yet — tap the heart icon on scriptures in Read or Search to save them here.</p>`;
    return;
  }
  el.innerHTML = "";
  currentUser.favorites.forEach(f => {
    const card = document.createElement("div");
    card.className = "fav-card";
    card.innerHTML = `
      <div style="flex: 1;">
        <div class="result-ref">${f.ref}</div>
        <div class="result-text">“${escapeHtml(f.text)}”</div>
      </div>
      <div class="verse-actions" style="align-self: center;">
        <button class="circle-btn audio-btn" type="button">🔊</button>
        <button class="circle-btn fav-btn active" type="button">♥</button>
      </div>
    `;
    card.querySelector(".fav-btn").addEventListener("click", ev => toggleFavorite(f.ref, f.text, ev.target).then(renderFavorites));
    card.querySelector(".audio-btn").addEventListener("click", ev => speakVerse(`${f.ref}. ${f.text}`, ev.target));
    el.appendChild(card);
  });
}

/* ================= INIT ================= */
trySessionRestore();
</script>
